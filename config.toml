[theme]
primaryColor = "#818CF8"
backgroundColor = "#0A0E1A"
secondaryBackgroundColor = "#1E293B"
textColor = "#E2E8F0"
font = "sans serif"

[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 200

[browser]
gatherUsageStats = false


[client]
showErrorDetails = false

[runner]
python_version = "3.11"
